<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>土層台帳 入力アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:15px;background:#f4f4f4;color:#222}
header{background:#2c5f8a;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:bold}
.header-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-white{background:#fff;color:#2c5f8a}
.btn-green{background:#2ecc71;color:#fff}
.btn-red{background:#e74c3c;color:#fff}
.btn-orange{background:#e67e22;color:#fff}
.btn-blue{background:#3498db;color:#fff}
.btn-gray{background:#888;color:#fff}
.tabs{display:flex;background:#1a3f60;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:10px 4px;text-align:center;color:#aad;cursor:pointer;font-size:13px;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom:3px solid #4fc3f7;font-weight:bold}
.panel{display:none;padding:12px}
.panel.active{display:block}

/* 入力フォーム */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:#555;font-weight:bold}
select,input[type=text],input[type=number],textarea{
  width:100%;padding:8px;border:1px solid #ccc;border-radius:5px;
  font-size:15px;background:#fff;-webkit-appearance:none
}
textarea{height:60px;resize:vertical}
.preview-box{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;margin-top:10px}
.preview-box h3{font-size:13px;color:#555;margin-bottom:6px}
.preview-val{font-size:15px;color:#222;min-height:20px}
.preview-val.auto{color:#1a6bb5;font-weight:bold}
.preview-val.empty{color:#aaa;font-style:italic}
.copy-btn{margin-top:6px;font-size:12px;padding:5px 10px}

/* 混入物 */
.konkyu-list{margin:6px 0;display:flex;flex-direction:column;gap:6px}
.konkyu-item{background:#e8f4ff;border-radius:6px;padding:8px;position:relative}
.konkyu-item .remove-btn{position:absolute;right:6px;top:6px;background:#e74c3c;color:#fff;border:none;border-radius:3px;padding:2px 7px;font-size:12px;cursor:pointer}
.konkyu-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:4px;align-items:center}
.konkyu-label{font-size:11px;color:#555;text-align:center}
.add-konkyu-btn{background:#3498db;color:#fff;border:none;border-radius:5px;padding:7px 12px;font-size:13px;cursor:pointer;width:100%;margin-top:4px}

/* 一覧 */
.list-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
th{background:#2c5f8a;color:#fff;padding:7px 6px;text-align:left;white-space:nowrap}
td{padding:6px;border-bottom:1px solid #ddd;vertical-align:top}
tr:hover td{background:#f0f7ff}
.edit-btn{background:#3498db;color:#fff;border:none;border-radius:3px;padding:3px 8px;cursor:pointer;font-size:12px}
.del-btn{background:#e74c3c;color:#fff;border:none;border-radius:3px;padding:3px 8px;cursor:pointer;font-size:12px}
.action-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.count-badge{background:#2c5f8a;color:#fff;padding:4px 10px;border-radius:12px;font-size:13px}

/* アコーディオン */
.group-header{
  display:flex;align-items:center;justify-content:space-between;
  background:#2c5f8a;color:#fff;padding:10px 12px;
  border-radius:6px;margin-bottom:4px;cursor:pointer;
  user-select:none;
}
.group-header:hover{background:#1a3f60}
.group-title{font-weight:bold;font-size:15px}
.group-meta{font-size:12px;color:#aad;margin-left:8px}
.group-arrow{font-size:14px;transition:transform 0.2s}
.group-arrow.open{transform:rotate(90deg)}
.group-body{display:none;margin-bottom:10px}
.group-body.open{display:block}

/* 保存ボタン */
.save-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.save-btns .btn{padding:12px;font-size:14px}
.notice{color:#888;font-size:12px;margin-top:6px;text-align:center}

/* 写真エリア */
.photo-area{padding:10px;border-top:1px solid #d0dde8;margin-top:6px}
.photo-area-title{font-size:12px;font-weight:bold;color:#2c5f8a;margin-bottom:8px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:8px}
.photo-card{position:relative;border-radius:6px;overflow:hidden;background:#e8f0f7;border:1px solid #c0d4e8}
.photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.photo-card .photo-caption{font-size:11px;padding:3px 5px;background:rgba(0,0,0,0.55);color:#fff;position:absolute;bottom:0;left:0;right:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-card .photo-del{position:absolute;top:3px;right:3px;background:rgba(231,76,60,0.85);color:#fff;border:none;border-radius:3px;padding:1px 6px;font-size:12px;cursor:pointer}
.photo-add-btn{background:#fff;border:2px dashed #2c5f8a;border-radius:6px;color:#2c5f8a;font-size:13px;font-weight:bold;padding:8px;width:100%;cursor:pointer;margin-top:2px}
.photo-add-btn:hover{background:#eaf3fb}
.photo-input{display:none}
</style>
</head>
<body>

<header>
  <h1>🏺 土層台帳</h1>
  <div class="header-btns">
    <button class="btn btn-white" onclick="exportCSV()">CSV出力</button>
    <button class="btn btn-white" onclick="saveJSON()">JSON保存</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">入力</div>
  <div class="tab" onclick="switchTab('list')">一覧 (<span id="countBadge">0</span>)</div>
  <div class="tab" onclick="switchTab('settings')">設定</div>
</div>

<!-- ===== 入力タブ ===== -->
<div class="panel active" id="panel-input">

  <div class="form-grid">
    <div class="form-group">
      <label>遺構種別</label>
      <select id="ikoType"></select>
    </div>
    <div class="form-group">
      <label>遺構番号</label>
      <select id="ikoNum"></select>
    </div>
    <div class="form-group">
      <label>SPL</label>
      <select id="spl"><option value=""></option></select>
    </div>
    <div class="form-group">
      <label>層番</label>
      <select id="soban"></select>
    </div>
    <div class="form-group">
      <label>Hue</label>
      <select id="hue" onchange="updateColor()"></select>
    </div>
    <div class="form-group">
      <label>Value</label>
      <select id="value_" onchange="updateColor()"></select>
    </div>
    <div class="form-group">
      <label>Chroma</label>
      <select id="chroma" onchange="updateColor()"></select>
    </div>
    <div class="form-group">
      <label>土種</label>
      <select id="doshu"></select>
    </div>
    <div class="form-group">
      <label>締り</label>
      <select id="shimari"></select>
    </div>
    <div class="form-group">
      <label>粘性</label>
      <select id="nendo"></select>
    </div>
    <div class="form-group full">
      <label>性格（自由記入）</label>
      <input type="text" id="seikaku" placeholder="例: 掘方埋土">
    </div>
  </div>

  <!-- 混入物 -->
  <div style="margin-top:10px">
    <label style="font-size:12px;color:#555;font-weight:bold">混入物</label>
    <div class="konkyu-list" id="konnyuList"></div>
    <button class="add-konkyu-btn" onclick="addKonnyu()">＋ 混入物を追加</button>
  </div>

  <div class="form-group full" style="margin-top:8px">
    <label>備考</label>
    <textarea id="biko" placeholder="自由記入"></textarea>
  </div>

  <!-- プレビュー -->
  <div class="preview-box">
    <h3>▼ 自動補完プレビュー</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div>
        <div style="font-size:11px;color:#888">遺構コード</div>
        <div class="preview-val auto" id="prev_code">-</div>
      </div>
      <div>
        <div style="font-size:11px;color:#888">色コード</div>
        <div class="preview-val auto" id="prev_colorcode">-</div>
      </div>
      <div>
        <div style="font-size:11px;color:#888">土色</div>
        <div class="preview-val auto" id="prev_color">-</div>
      </div>
    </div>
    <div style="font-size:11px;color:#888">混入物記載文</div>
    <div class="preview-val" id="prev_konnyu" style="font-size:13px;margin-bottom:6px"></div>
    <div style="font-size:11px;color:#888">全体記載文</div>
    <div class="preview-val" id="prev_all" style="font-size:13px"></div>
    <button class="btn btn-gray copy-btn" onclick="copyAll()">📋 全体記載文をコピー</button>
  </div>

  <div class="save-btns">
    <button class="btn btn-green" onclick="saveRecord()">💾 保存する</button>
    <button class="btn btn-blue" onclick="saveAndNext()">＋ 追加して次層へ</button>
  </div>
  <div style="text-align:center;margin-top:6px">
    <button class="btn btn-gray" onclick="resetForm()" style="padding:8px 20px">リセット</button>
  </div>
  <div class="notice">保存していない場合、画面を閉じると入力内容は消えます。</div>
</div>

<!-- ===== 一覧タブ ===== -->
<div class="panel" id="panel-list">
  <div class="action-bar">
    <span class="count-badge" id="listCount">0件</span>
    <button class="btn btn-white" onclick="exportCSV()" style="border:1px solid #ccc">📥 CSV出力</button>
    <button class="btn btn-white" onclick="saveJSON()" style="border:1px solid #ccc">💾 JSON保存</button>
    <button class="btn btn-white" onclick="loadJSON()" style="border:1px solid #ccc">📂 JSON読込</button>
    <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="loadJSONFile(event)">
  </div>
  <div id="groupedList"></div>
</div>

<!-- ===== 設定タブ ===== -->
<div class="panel" id="panel-settings">
  <p style="font-size:13px;color:#555;margin-bottom:10px">端末（このブラウザ）にデータを保存・復元します。</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <button class="btn btn-green" onclick="saveToLocal()">📱 端末に保存</button>
    <button class="btn btn-blue" onclick="loadFromLocal()">📲 端末から復元</button>
    <button class="btn btn-white" onclick="saveJSON()" style="border:1px solid #ccc">💾 JSONダウンロード</button>
    <button class="btn btn-white" onclick="loadJSON()" style="border:1px solid #ccc">📂 JSONファイル読込</button>
    <button class="btn btn-red" onclick="clearLocal()">🗑 端末保存を消す</button>
  </div>
  <hr style="margin:14px 0">
  <h3 style="font-size:14px;margin-bottom:8px">選択肢マスタ（追加）</h3>
  <div id="masterEditor"></div>
</div>

// localStorage追加マスタをマージ
function loadLocalMasters() {
  try {
    const saved = localStorage.getItem('dosoMasters');
    if (saved) {
      const m = JSON.parse(saved);
      Object.keys(m).forEach(k => {
        if (MASTERS[k]) {
          m[k].forEach(v => { if (!MASTERS[k].includes(v)) MASTERS[k].push(v); });
        }
      });
    }
  } catch(e) {}
}

function buildSelects() {
  // 遺構番号 01〜99
  const ikoNumEl = document.getElementById('ikoNum');
  ikoNumEl.innerHTML = '<option value="">--</option>';
  for (let i = 1; i <= 99; i++) {
    const v = String(i).padStart(2, '0');
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    ikoNumEl.appendChild(o);
  }
  ikoNumEl.addEventListener('change', updatePreview);

  // 層番 1〜99
  const sobanEl = document.getElementById('soban');
  sobanEl.innerHTML = '<option value="">--</option>';
  for (let i = 1; i <= 99; i++) {
    const o = document.createElement('option');
    o.value = String(i); o.textContent = String(i);
    sobanEl.appendChild(o);
  }
  sobanEl.addEventListener('change', updatePreview);

  const defs = [
    ['ikoType', 'ikoType'],
    ['spl', 'spl'],
    ['hue', 'hue'],
    ['value_', 'value_'],
    ['chroma', 'chroma'],
    ['doshu', 'doshu'],
    ['shimari', 'shimari'],
    ['nendo', 'nendo'],
  ];
  defs.forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    MASTERS[key].forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v || '---';
      el.appendChild(o);
    });
    el.addEventListener('change', updatePreview);
  });
  document.getElementById('seikaku').addEventListener('input', updatePreview);
  document.getElementById('biko').addEventListener('input', updatePreview);
}

// ===== 土色検索 =====
function getColorName(hue, val, chr) {
  if (!hue || !val || !chr) return null;
  // N系は特殊
  if (hue === 'N') {
    const key = `N${val}/`;
    return COLOR_MASTER[key] || null;
  }
  const key = `${hue}${val}/${chr}`;
  return COLOR_MASTER[key] || null;
}

function updateColor() { updatePreview(); }

function updatePreview() {
  const ikoType = document.getElementById('ikoType').value;
  const ikoNum  = document.getElementById('ikoNum').value;
  const spl     = document.getElementById('spl').value;
  const soban   = document.getElementById('soban').value;
  const hue     = document.getElementById('hue').value;
  const val     = document.getElementById('value_').value;
  const chr     = document.getElementById('chroma').value;
  const doshu   = document.getElementById('doshu').value;
  const shimari = document.getElementById('shimari').value;
  const nendo   = document.getElementById('nendo').value;
  const seikaku = document.getElementById('seikaku').value.trim();

  // 遺構コード
  const code = ikoType && ikoNum ? `${ikoType}${ikoNum}` : '-';
  document.getElementById('prev_code').textContent = code;

  // 色コード
  const colorCode = hue && val && chr ? (hue === 'N' ? `N${val}/` : `${hue}${val}/${chr}`) : '-';
  document.getElementById('prev_colorcode').textContent = colorCode;

  // 土色名
  const colorName = getColorName(hue, val, chr);
  const prevColor = document.getElementById('prev_color');
  if (colorName) {
    prevColor.textContent = colorName;
    prevColor.className = 'preview-val auto';
  } else if (hue && val && chr) {
    prevColor.textContent = '※マスタ未登録';
    prevColor.className = 'preview-val empty';
  } else {
    prevColor.textContent = '-';
    prevColor.className = 'preview-val';
  }

  // 混入物記載文
  const konnyuText = buildKonnyuText();
  document.getElementById('prev_konnyu').textContent = konnyuText || '（混入物なし）';

  // 全体記載文
  let parts = [];
  if (colorCode !== '-' && colorName) parts.push(`${colorCode}（${colorName}）`);
  if (doshu) parts.push(doshu);
  if (shimari) parts.push(`締り${shimari}`);
  if (nendo) parts.push(`粘性${nendo}`);
  if (konnyuText) parts.push(konnyuText);
  if (seikaku) parts.push(seikaku);
  const allText = parts.join('。');
  document.getElementById('prev_all').textContent = allText || '（入力中）';
}

function removeKonnyu(id) {
  const el = document.getElementById(`konnyu_${id}`);
  if (el) el.remove();
  updatePreview();
}

function getKonnyuData() {
  const items = document.querySelectorAll('.konkyu-item');
  return Array.from(items).map(item => {
    const sels = item.querySelectorAll('select');
    return {
      type: sels[0].value,
      kata: sels[1].value,
      mmMin: sels[2].value,
      mmMax: sels[3].value,
      unit: sels[4].value,
      ryo: sels[5].value,
      iri: sels[6].value
    };
  });
}

function buildKonnyuText() {
  const data = getKonnyuData();
  if (!data.length) return '';
  return data.map(d => {
    let s = d.type;
    if (d.kata) s += `（${d.kata}）`;
    if (d.mmMin && d.mmMax) {
      const a = Math.min(Number(d.mmMin)||0, Number(d.mmMax)||0);
      const b = Math.max(Number(d.mmMin)||0, Number(d.mmMax)||0);
      if (a === b) s += `（φ${a}${d.unit}）`;
      else s += `（φ${a}〜${b}${d.unit}）`;
    } else if (d.mmMin) {
      s += `（φ${d.mmMin}${d.unit}）`;
    }
    if (d.ryo) s += `を${d.ryo}`;
    if (d.iri) s += `・${d.iri}`;
    s += '含む';
    return s;
  }).join('、');
}

// ===== レコード操作 =====
function collectForm() {
  const hue = document.getElementById('hue').value;
  const val = document.getElementById('value_').value;
  const chr = document.getElementById('chroma').value;
  const colorCode = hue && val && chr ? (hue==='N' ? `N${val}/` : `${hue}${val}/${chr}`) : '';
  const colorName = getColorName(hue, val, chr) || '';
  const konnyuData = getKonnyuData();
  const konnyuText = buildKonnyuText();

  const doshu   = document.getElementById('doshu').value;
  const shimari = document.getElementById('shimari').value;
  const nendo   = document.getElementById('nendo').value;
  const seikaku = document.getElementById('seikaku').value.trim();

  let allParts = [];
  if (colorCode && colorName) allParts.push(`${colorCode}（${colorName}）`);
  if (doshu)   allParts.push(doshu);
  if (shimari) allParts.push(`締り${shimari}`);
  if (nendo)   allParts.push(`粘性${nendo}`);
  if (konnyuText) allParts.push(konnyuText);
  if (seikaku) allParts.push(seikaku);

  return {
    ikoType: document.getElementById('ikoType').value,
    ikoNum:  document.getElementById('ikoNum').value.trim(),
    spl:     document.getElementById('spl').value,
    soban:   document.getElementById('soban').value,
    hue, value: val, chroma: chr,
    colorCode, colorName,
    doshu, shimari, nendo, seikaku,
    konnyuData,
    konnyuText,
    biko: document.getElementById('biko').value.trim(),
    allText: allParts.join('。')
  };
}

function saveRecord() {
  const r = collectForm();
  if (!r.ikoType || !r.ikoNum || !r.soban) {
    alert('遺構種別・遺構番号・層番は必須です。');
    return;
  }
  if (editIndex >= 0) {
    records[editIndex] = r;
    editIndex = -1;
  } else {
    records.push(r);
  }
  renderList();
  updateBadge();
  resetForm();
  switchTab('list');
}

function saveAndNext() {
  const r = collectForm();
  if (!r.ikoType || !r.ikoNum || !r.soban) {
    alert('遺構種別・遺構番号・層番は必須です。');
    return;
  }
  records.push(r);
  renderList();
  updateBadge();
  const nextSoban = Math.min((parseInt(r.soban)||0) + 1, 99);
  // 混入物は残す・層番・備考・性格だけリセット
  document.getElementById('soban').value = String(nextSoban);
  document.getElementById('biko').value = '';
  document.getElementById('seikaku').value = '';
  updatePreview();
  alert(`層番 ${r.soban} を保存しました。次の層番 ${nextSoban} を入力してください。`);
}

// 開閉状態を記憶
const openGroups = new Set();

// 写真データ: { [遺構コード]: [{id, dataUrl, caption}] }
const groupPhotos = {};

function renderList() {
  const container = document.getElementById('groupedList');
  container.innerHTML = '';

  if (!records.length) {
    container.innerHTML = '<p style="color:#888;text-align:center;margin-top:20px">データがありません。</p>';
    document.getElementById('listCount').textContent = '0件';
    document.getElementById('countBadge').textContent = '0';
    return;
  }

  // 遺構コード（種別+番号）ごとにグループ化
  const groups = {};
  records.forEach((r, i) => {
    const code = `${r.ikoType}${(r.ikoNum||'').padStart(2,'0')}`;
    if (!groups[code]) groups[code] = [];
    groups[code].push({ r, i });
  });

  // 遺構コード順にソート
  const sortedKeys = Object.keys(groups).sort();

  sortedKeys.forEach(code => {
    const items = groups[code];
    const isOpen = openGroups.has(code);
    const photos = groupPhotos[code] || [];

    // グループヘッダー
    const header = document.createElement('div');
    header.className = 'group-header';
    const photoCount = photos.length ? `📷${photos.length}枚` : '';
    header.innerHTML = `
      <div>
        <span class="group-title">📂 ${code}</span>
        <span class="group-meta">${items.length}層 ${photoCount}</span>
      </div>
      <span class="group-arrow ${isOpen ? 'open' : ''}">▶</span>
    `;
    header.addEventListener('click', () => toggleGroup(code));

    // グループ本体
    const body = document.createElement('div');
    body.className = `group-body ${isOpen ? 'open' : ''}`;
    body.id = `group_${code}`;

    // 層番テーブル
    const wrap = document.createElement('div');
    wrap.className = 'list-table-wrap';
    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>層番</th><th>色コード</th><th>土色</th><th>土種</th>
          <th>締り</th><th>粘性</th><th>混入物（概要）</th><th>操作</th>
        </tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');
    items.sort((a, b) => (parseInt(a.r.soban)||0) - (parseInt(b.r.soban)||0));
    items.forEach(({ r, i }) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-weight:bold">${r.soban}</td>
        <td>${r.colorCode||''}</td>
        <td>${r.colorName||''}</td>
        <td>${r.doshu||''}</td>
        <td>${r.shimari||''}</td>
        <td>${r.nendo||''}</td>
        <td style="max-width:180px;font-size:12px">${r.konnyuText||''}</td>
        <td>
          <button class="edit-btn" onclick="editRecord(${i})">編集</button>
          <button class="del-btn" onclick="deleteRecord(${i})">削除</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    body.appendChild(wrap);

    // 写真エリア
    const photoArea = document.createElement('div');
    photoArea.className = 'photo-area';
    photoArea.innerHTML = `<div class="photo-area-title">📷 メモ写真</div>`;

    const grid = document.createElement('div');
    grid.className = 'photo-grid';
    grid.id = `photoGrid_${code}`;
    photos.forEach(p => {
      grid.appendChild(makePhotoCard(code, p));
    });
    photoArea.appendChild(grid);

    // 写真追加ボタン
    const addBtn = document.createElement('button');
    addBtn.className = 'photo-add-btn';
    addBtn.textContent = '＋ 写真を追加（カメラ / ライブラリ）';
    addBtn.addEventListener('click', () => triggerPhotoInput(code));
    photoArea.appendChild(addBtn);

    // 隠しファイル入力
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.capture = 'environment'; // iPadでカメラを優先
    fileInput.multiple = true;
    fileInput.className = 'photo-input';
    fileInput.id = `photoInput_${code}`;
    fileInput.addEventListener('change', e => handlePhotoInput(e, code));
    photoArea.appendChild(fileInput);

    body.appendChild(photoArea);
    container.appendChild(header);
    container.appendChild(body);
  });

  document.getElementById('listCount').textContent = `${records.length}件`;
  document.getElementById('countBadge').textContent = records.length;
}

function makePhotoCard(code, p) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = `photo_${p.id}`;
  card.innerHTML = `
    <img src="${p.dataUrl}" alt="${p.caption||''}">
    <div class="photo-caption" title="${p.caption||''}">${p.caption||'（メモなし）'}</div>
    <button class="photo-del" onclick="deletePhoto('${code}','${p.id}')">✕</button>
  `;
  // 長押しでキャプション編集
  card.querySelector('img').addEventListener('click', () => editCaption(code, p.id));
  return card;
}

function triggerPhotoInput(code) {
  const input = document.getElementById(`photoInput_${code}`);
  if (input) input.click();
}

function handlePhotoInput(e, code) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  if (!groupPhotos[code]) groupPhotos[code] = [];
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const id = `p_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
      const caption = prompt(`写真「${file.name}」のメモを入力してください（スキップ可）:`) || '';
      groupPhotos[code].push({ id, dataUrl: ev.target.result, caption });
      loaded++;
      if (loaded === files.length) {
        renderList();
        // 開いていたグループを再度開く
        openGroups.forEach(c => {
          const b = document.getElementById(`group_${c}`);
          const arr = document.querySelector(`#group_${c}`)?.previousElementSibling?.querySelector('.group-arrow');
          if (b) { b.classList.add('open'); }
          if (arr) arr.classList.add('open');
        });
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function deletePhoto(code, id) {
  if (!confirm('この写真を削除しますか？')) return;
  if (groupPhotos[code]) {
    groupPhotos[code] = groupPhotos[code].filter(p => p.id !== id);
  }
  renderList();
}

function editCaption(code, id) {
  const photos = groupPhotos[code] || [];
  const p = photos.find(p => p.id === id);
  if (!p) return;
  const newCaption = prompt('メモを編集:', p.caption || '');
  if (newCaption === null) return;
  p.caption = newCaption;
  renderList();
}

function toggleGroup(code) {
  const body = document.getElementById(`group_${code}`);
  if (!body) return;
  const header = body.previousElementSibling;
  const arrow = header?.querySelector('.group-arrow');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
    openGroups.delete(code);
  } else {
    body.classList.add('open');
    if (arrow) arrow.classList.add('open');
    openGroups.add(code);
  }
}

function updateBadge() {
  document.getElementById('countBadge').textContent = records.length;
}

// ===== タブ切替 =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['input','list','settings'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === `panel-${name}`);
  });
  if (name === 'list') renderList();
}

// ===== CSV出力 =====
function exportCSV() {
  if (!records.length) { alert('データがありません。'); return; }
  const headers = ['遺構種別','遺構番号','SPL','層番','Hue','Value','Chroma','色コード','土色','土種','締り','粘性','性格','混入物記載文','備考','全体記載文'];
  const rows = records.map(r => [
    r.ikoType, r.ikoNum, r.spl, r.soban,
    r.hue, r.value, r.chroma, r.colorCode, r.colorName,
    r.doshu, r.shimari, r.nendo, r.seikaku,
    r.konnyuText, r.biko, r.allText
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`));
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `土層台帳_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ===== JSON保存・読込 =====
function saveJSON() {
  const defaultName = `土層台帳_${new Date().toISOString().slice(0,10)}`;
  const inputName = prompt('保存ファイル名を入力してください（.jsonは自動付加）:', defaultName);
  if (inputName === null) return; // キャンセル
  const fileName = (inputName.trim() || defaultName).replace(/\.json$/i, '') + '.json';
  const payload = { records, photos: groupPhotos };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
}
function loadJSON() { document.getElementById('jsonFileInput').click(); }
function loadJSONFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      // 旧形式（配列）と新形式（{records, photos}）に対応
      const newRecords = Array.isArray(data) ? data : (data.records || []);
      const newPhotos  = Array.isArray(data) ? {} : (data.photos || {});
      if (!Array.isArray(newRecords)) throw new Error();
      if (records.length && !confirm('現在のデータを置き換えますか？')) return;
      records.length = 0;
      newRecords.forEach(r => records.push(r));
      Object.keys(groupPhotos).forEach(k => delete groupPhotos[k]);
      Object.assign(groupPhotos, newPhotos);
      renderList();
      updateBadge();
      alert(`${records.length}件を読み込みました。`);
    } catch { alert('JSONの読み込みに失敗しました。'); }
  };
  r.readAsText(file);
  e.target.value = '';
}

// ===== localStorage =====
function saveToLocal() {
  try {
    localStorage.setItem('dosoRecords', JSON.stringify(records));
    localStorage.setItem('dosoPhotos', JSON.stringify(groupPhotos));
    alert('端末に保存しました。');
  } catch(e) {
    alert('写真データが大きすぎて端末保存できませんでした。JSON保存をお使いください。');
  }
}
function loadFromLocal() {
  const d = localStorage.getItem('dosoRecords');
  if (!d) { alert('保存データがありません。'); return; }
  if (records.length && !confirm('現在のデータを置き換えますか？')) return;
  records.length = 0;
  JSON.parse(d).forEach(r => records.push(r));
  const p = localStorage.getItem('dosoPhotos');
  Object.keys(groupPhotos).forEach(k => delete groupPhotos[k]);
  if (p) Object.assign(groupPhotos, JSON.parse(p));
  renderList();
  updateBadge();
  alert(`${records.length}件を復元しました。`);
}
function clearLocal() {
  if (!confirm('端末保存データを消去しますか？')) return;
  localStorage.removeItem('dosoRecords');
  localStorage.removeItem('dosoPhotos');
  alert('消去しました。');
}

// ===== コピー =====
function copyAll() {
  const text = document.getElementById('prev_all').textContent;
  navigator.clipboard.writeText(text).then(() => alert('コピーしました。')).catch(() => {
    prompt('以下をコピーしてください:', text);
  });
}

// ===== マスタ編集UI =====
function buildMasterEditor() {
  const container = document.getElementById('masterEditor');
  const groups = [
    { label:'混入物 種類', key:'konnyuType' },
    { label:'土種', key:'doshu' },
    { label:'mm候補', key:'konnyuMm' },
    { label:'遺構コード', key:'ikoType' },
    { label:'含み方', key:'konnyuIri' },
  ];
  container.innerHTML = groups.map(g => `
    <div style="margin-bottom:10px">
      <div style="font-size:13px;font-weight:bold;margin-bottom:4px">${g.label}</div>
      <div style="font-size:12px;color:#555;margin-bottom:4px">${MASTERS[g.key].join('、')}</div>
      <div style="display:flex;gap:6px">
        <input type="text" id="add_${g.key}" placeholder="追加する値" style="flex:1;padding:6px;border:1px solid #ccc;border-radius:4px;font-size:14px">
        <button class="btn btn-blue" onclick="addMaster('${g.key}')" style="padding:6px 10px">追加</button>
      </div>
    </div>
  `).join('');
}

function addMaster(key) {
  const input = document.getElementById(`add_${key}`);
  const val = input.value.trim();
  if (!val) return;
  if (!MASTERS[key].includes(val)) {
    MASTERS[key].push(val);
    // localStorageに保存
    try {
      const saved = JSON.parse(localStorage.getItem('dosoMasters') || '{}');
      if (!saved[key]) saved[key] = [];
      if (!saved[key].includes(val)) saved[key].push(val);
      localStorage.setItem('dosoMasters', JSON.stringify(saved));
    } catch(e) {}
    buildSelects();
    buildMasterEditor();
    alert(`「${val}」を追加しました。`);
  } else {
    alert('すでに存在します。');
  }
  input.value = '';
}

// ===== 起動 =====
init();
</script>
